<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drone Control Station</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="titlebar">
        <nav class="toolbar" aria-label="Toolbar">
          <button id="lhsToggle" class="btn is-toggle is-active" title="Toggle drone list">DRONES</button>
          <div class="toolbar-divider"></div>
          <div class="segmented" aria-label="Main view">
            <button class="segment is-active" data-view="forward">FWD</button>
            <button class="segment" data-view="downward">DOWN</button>
          </div>
          <div class="toolbar-divider"></div>
          <button id="newFlight" class="btn">NEW FLIGHT</button>
          <button id="recordToggle" class="btn">RECORD</button>
          <div class="toolbar-spacer"></div>
          <span id="serviceStatus" class="toolbar-status">STARTING</span>
          <div class="toolbar-divider"></div>
          <button id="rhsToggle" class="btn is-toggle is-active" title="Toggle inspector">INSPECTOR</button>
        </nav>
      </header>

      <div class="workspace">
        <aside id="lhs" class="sidebar lhs">
          <section class="sidebar-header">
            <h2 class="section-label">Drones</h2>
            <span id="droneCount" class="count">0</span>
          </section>
          <div id="droneTree" class="tree"></div>
        </aside>

        <main class="main-area">
          <section id="forwardView" class="view-panel is-active" aria-label="Forward camera">
            <div class="camera-stage">
              <div class="stream-frame">
                <img id="forwardStream" class="stream-image is-hidden" alt="" />
                <div id="forwardEmpty" class="empty-stream">No forward record</div>
                <div class="camera-strip">
                  <span>FWD</span><span class="sep">·</span>
                  <span id="forwardResolution">—</span><span class="sep">·</span>
                  <span id="forwardEndpoint">—</span>
                </div>
              </div>
            </div>
          </section>

          <section id="downwardView" class="view-panel" aria-label="Downward camera">
            <div class="camera-stage">
              <div class="stream-frame">
                <div class="empty-stream">No downward camera</div>
              </div>
            </div>
          </section>
        </main>

        <aside id="rhs" class="sidebar rhs">
          <section class="sidebar-header">
            <h2 class="section-label">Flight</h2>
          </section>

          <section class="panel">
            <h3 class="section-label" style="margin-bottom: 10px;">Mode</h3>
            <div class="segmented" role="group" aria-label="Flight mode">
              <button class="segment is-active" data-mode="review">REVIEW</button>
              <button class="segment" data-mode="manual">MANUAL</button>
              <button class="segment" data-mode="policy">POLICY</button>
            </div>
          </section>

          <section id="manualPanel" class="panel manual-panel is-hidden">
            <div class="panel-title-row">
              <h3 class="section-label">Control</h3>
              <span id="manualState" class="pill">DISARMED</span>
            </div>
            <div class="manual-actions">
              <button id="armButton" class="btn">ARM</button>
              <button id="disarmButton" class="btn">DISARM</button>
              <button id="stopButton" class="btn is-danger">STOP</button>
            </div>
            <div class="control-pad">
              <button data-control="pitch-up">FWD</button>
              <button data-control="yaw-left">CCW</button>
              <button data-control="stop">STOP</button>
              <button data-control="yaw-right">CW</button>
              <button data-control="roll-left">LEFT</button>
              <button data-control="pitch-down">BACK</button>
              <button data-control="roll-right">RIGHT</button>
            </div>
            <div class="throttle-row">
              <label for="throttle">THR</label>
              <input id="throttle" type="range" min="0" max="192" value="0" />
              <output id="throttleValue">0</output>
            </div>
            <p id="manualMessage" class="manual-message">DISARMED</p>
          </section>

          <section class="panel">
            <h3 class="section-label" style="margin-bottom: 10px;">Metadata</h3>
            <dl id="metadataList" class="kv"></dl>
          </section>

          <section class="panel">
            <h3 class="section-label" style="margin-bottom: 10px;">Metrics</h3>
            <dl id="metricsGrid" class="kv"></dl>
          </section>

          <section class="panel">
            <div class="panel-title-row">
              <h3 class="section-label">Records</h3>
              <span id="recordingCounter" class="pill is-recording is-hidden">REC 0</span>
            </div>
            <dl id="recordsList" class="kv stacked"></dl>
          </section>
        </aside>
      </div>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
